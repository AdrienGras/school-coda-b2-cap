# Mock de votre API, servi directement depuis votre contrat.
#
# Démarrer :  docker compose up
# Puis :      http://localhost:4010  (Bruno, curl, navigateur...)
#
# Prism surveille votre contrat : modifiez openapi.yaml, rejouez la requête,
# le mock a déjà changé. Pas besoin de redémarrer.

services:
  mock:
    image: stoplight/prism:5
    # -h 0.0.0.0 : sans ça, Prism n'écoute qu'à l'intérieur du conteneur
    #              et reste injoignable depuis votre machine.
    # -m false   : le mode multiprocess de Prism est cassé sur cette image
    #              (le conteneur s'arrête aussitôt en affichant son aide).
    command: mock -h 0.0.0.0 -m false /tmp/openapi.yaml
    volumes:
      # On monte le DOSSIER, pas le fichier seul. Un montage de fichier est
      # résolu vers son inode, que votre éditeur remplace à l'enregistrement :
      # le conteneur continuerait de voir l'ancienne version, et vos
      # modifications n'atteindraient jamais le mock.
      - .:/tmp:ro
    ports:
      - "4010:4010"
